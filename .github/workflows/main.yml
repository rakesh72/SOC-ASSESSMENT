name: Download MITRE Enterprise JSON
on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday midnight UTC
  workflow_dispatch:      # Manual trigger button

permissions:
  contents: write        # ✅ Fixes permission issues

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4        # ✅ Latest version - Node 20 compatible
      
    - name: Create assets directory
      run: mkdir -p assets
      
    - name: Download MITRE Enterprise JSON
      run: |
        curl -L -o assets/enterprise-attack.json \
        https://raw.githubusercontent.com/mitre/cti/master/enterprise-attack/enterprise-attack.json
        
    - name: Download MITRE Data Sources
      run: |
        curl -L -o assets/datasources.json \
        https://raw.githubusercontent.com/mitre/cti/master/enterprise-attack/datasources.json
        
    - name: Commit updated files
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add assets/*.json
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🔄 Update MITRE ATT&CK JSON [$(date +%Y-%m-%d)]"
          git push
        fi
