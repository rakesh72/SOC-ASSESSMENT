name: MITRE Excel → Technique Data Component Mapping
on:
  schedule:
    - cron: '0 2 * * 0'  # Sunday 2AM UTC
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ Fixes Node 20 warning

jobs:
  map-techniques:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v5  # ✅ Latest - Node 24 compatible
      
    - name: Setup Python 3.11
      uses: actions/setup-python@v5  # ✅ Latest - Node 24 compatible
      with:
        python-version: '3.11'
        
    - name: Create directories
      run: |
        mkdir -p .github/scripts assets
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas==2.2.2 openpyxl==3.1.5 requests==2.32.3
        
    - name: Run MITRE Excel processor
      run: python .github/process_mitre_excel.py
      
    - name: Commit results
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add assets/*.json assets/*.xlsx || true
        if ! git diff --staged --quiet; then
          git commit -m "🔄 MITRE Excel mapping updated [$(date +%Y-%m-%d)]"
          git push
        else
          echo "✅ No changes to commit"
        fi
