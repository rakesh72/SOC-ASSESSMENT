name: MITRE Excel → Technique Data Component Mapping
on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  map-techniques:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip pandas openpyxl requests
        
    - name: Debug - List files
      run: ls -la .github/scripts/ || mkdir -p .github/scripts
        
    - name: Create script & assets
      run: |
        mkdir -p .github/scripts assets
        cat > .github/scripts/process_mitre_excel.py << 'EOF'
        # [PASTE FIXED PYTHON SCRIPT BELOW]
        EOF
        
    - name: Run Excel processor
      run: python .github/process_mitre_excel.py
      
    - name: Show results
      run: |
        echo "Generated files:"
        ls -la assets/
        cat assets/technique-data-components.json | head -20
        
    - name: Commit
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add assets/ .github/scripts/
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "🔄 MITRE Excel mapping [$(date +%Y-%m-%d)]"
          git push
        fi
