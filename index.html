<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITRE ATT&CK SOC Matrix - Heatmap Style</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0a0a0a; color: #fff; overflow-x: auto;
        }
        .header { 
            background: linear-gradient(135deg, #1a237e 0%, #3f51b5 100%); 
            padding: 25px; text-align: center; 
        }
        .header h1 { font-size: 2.2em; margin-bottom: 10px; }
        .controls { 
            background: #1a1a1a; padding: 20px; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .matrix-controls { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        button { 
            background: linear-gradient(45deg, #4caf50, #45a049); color: white; 
            border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; 
            font-weight: 500; font-size: 14px; transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(76,175,80,0.4); }
        button:disabled { background: #666; cursor: not-allowed; transform: none; }
        input[type=file] { 
            padding: 12px; background: #2d2d2d; color: white; border: 1px solid #555; 
            border-radius: 8px; cursor: pointer;
        }
        #status { 
            padding: 12px 18px; border-radius: 8px; margin: 15px 0; font-weight: 500; 
            background: #2d2d2d;
        }
        .status-success { background: linear-gradient(45deg, #2e7d32, #4caf50) !important; }
        .status-error { background: linear-gradient(45deg, #d32f2f, #f44336) !important; }
        
        /* TRUE MITRE MATRIX */
        .matrix-container { 
            padding: 30px; max-width: 100vw; overflow: auto; background: #111; 
        }
        .matrix-wrapper { 
            display: inline-block; background: #1e1e1e; 
            border-radius: 12px; padding: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .attack-matrix { 
            border-collapse: separate; border-spacing: 2px; 
            background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
            border-radius: 12px; overflow: hidden;
        }
        
        /* TACTIC HEADERS (Left Column) */
        .tactic-header { 
            background: linear-gradient(135deg, #3f51b5, #1a237e) !important; 
            color: white !important; font-weight: bold !important; 
            font-size: 14px !important; padding: 15px 12px !important;
            writing-mode: vertical-rl; text-orientation: mixed; height: 180px; width: 50px !important;
            position: sticky; left: 0; z-index: 20; border: 2px solid #5c6bc0 !important;
        }
        
        /* TECHNIQUE HEADERS (Top Row) */
        .technique-header { 
            background: linear-gradient(135deg, #0288d1, #0277bd) !important; 
            color: white !important; font-weight: 600 !important; 
            font-size: 11px !important; padding: 8px 6px !important; 
            position: sticky; top: 0; z-index: 20; min-width: 90px; max-width: 110px;
            border: 2px solid #4fc3f7 !important; white-space: normal; 
        }
        .technique-header .id { font-size: 12px; font-weight: bold; display: block; }
        .technique-header .name { font-size: 9px; line-height: 1.1; }
        
        /* COVERAGE CELLS */
        td { 
            width: 95px; height: 95px; text-align: center; vertical-align: middle; 
            position: relative; cursor: pointer; transition: all 0.3s; border: 2px solid #333;
            font-size: 20px; font-weight: bold;
        }
        td:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 8px 25px rgba(0,0,0,0.6); }
        
        .coverage-none { background: #424242 !important; color: #aaa !important; }
        .coverage-low    { background: linear-gradient(45deg, #d32f2f, #f44336) !important; color: white !important; }
        .coverage-medium { background: linear-gradient(45deg, #f57c00, #ff9800) !important; color: white !important; }
        .coverage-high   { background: linear-gradient(45deg, #2e7d32, #4caf50) !important; color: white !important; }
        
        .coverage-popup {
            position: absolute; background: rgba(0,0,0,0.95); color: white; padding: 12px; 
            border-radius: 8px; font-size: 13px; z-index: 100; min-width: 250px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: none; pointer-events: none;
        }
        
        .summary-stats { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin: 30px 0; text-align: center;
        }
        .stat-card { 
            background: linear-gradient(135deg, #2d2d2d, #1a1a1a); padding: 25px; 
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat-number { font-size: 3em; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 MITRE ATT&CK® Enterprise Matrix</h1>
        <p>Complete SOC Coverage Heatmap • Log Analysis • Gap Identification</p>
    </div>

    <div class="controls">
        <div class="matrix-controls">
            <input type="file" id="logsCsv" accept=".csv">
            <button onclick="analyzeMatrix()" id="analyzeBtn">🚀 Analyze Coverage</button>
            <button onclick="exportLayer()">📊 Navigator Layer</button>
            <button onclick="exportCSV()">📤 Full CSV</button>
            <button onclick="resetMatrix()">🔄 Reset</button>
        </div>
        <div id="status">Loading MITRE ATT&CK data...</div>
    </div>

    <div class="matrix-container">
        <div class="summary-stats" id="summaryStats"></div>
        <div class="matrix-wrapper" id="matrixWrapper">
            <table class="attack-matrix" id="attackMatrix"></table>
            <div class="coverage-popup" id="tooltip"></div>
        </div>
    </div>

    <script>
        let mitreData = {}, logSources = {}, matrixData = {};
        const MITRE_TACTICS = {
            'TA0043': { name: 'Reconnaissance', techniques: [] },
            'TA0042': { name: 'Resource Development', techniques: [] },
            'TA0001': { name: 'Initial Access', techniques: [] },
            'TA0002': { name: 'Execution', techniques: [] },
            'TA0003': { name: 'Persistence', techniques: [] },
            'TA0004': { name: 'Privilege Escalation', techniques: [] },
            'TA0005': { name: 'Defense Evasion', techniques: [] },
            'TA0006': { name: 'Credential Access', techniques: [] },
            'TA0007': { name: 'Discovery', techniques: [] },
            'TA0008': { name: 'Lateral Movement', techniques: [] },
            'TA0009': { name: 'Collection', techniques: [] },
            'TA0011': { name: 'Command & Control', techniques: [] },
            'TA0010': { name: 'Exfiltration', techniques: [] },
            'TA0040': { name: 'Impact', techniques: [] }
        };

        // Load MITRE data automatically
        async function loadMitreData() {
            try {
                let response = await fetch('./assets/enterprise-attack.json');
                if (!response.ok) {
                    response = await fetch('https://raw.githubusercontent.com/mitre/cti/master/enterprise-attack/enterprise-attack.json');
                }
                mitreData = await response.json();
                parseMitreMatrix();
                updateStatus('✅ MITRE ATT&CK Matrix loaded! Ready for SOC analysis.', 'success');
                document.getElementById('analyzeBtn').disabled = false;
            } catch(e) {
                updateStatus('❌ Failed to load MITRE data. Check workflow or network.', 'error');
            }
        }

        function parseMitreMatrix() {
            mitreData.objects
                .filter(obj => obj.type === 'attack-pattern' && obj.external_references?.[0]?.external_id)
                .forEach(tech => {
                    const tacticId = tech.kill_chain_phases?.[0]?.phase_name;
                    const techId = tech.external_references[0].external_id;
                    
                    if (MITRE_TACTICS[tacticId]) {
                        MITRE_TACTICS[tacticId].techniques.push({
                            id: techId,
                            name: tech.name || 'Unnamed',
                            dataSources: tech['x_mitre_data_sources'] || []
                        });
                    }
                });
        }

        // File upload handler
        document.getElementById('logsCsv').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    logSources = {};
                    e.target.result.split('\n').slice(1).forEach(line => {
                        const [source, category, value] = line.split(',');
                        if (source?.trim()) {
                            logSources[source.trim()] = { category: category?.trim() || 'context', value: value?.trim() || 'medium' };
                        }
                    });
                    updateStatus(`✅ Loaded ${Object.keys(logSources).length} log sources`, 'success');
                };
                reader.readAsText(file);
            }
        });

        function analyzeMatrix() {
            if (!Object.keys(logSources).length) {
                alert('Please upload log sources CSV first!');
                return;
            }

            Object.keys(MITRE_TACTICS).forEach(tacticId => {
                MITRE_TACTICS[tacticId].techniques.forEach(tech => {
                    const coveredSources = tech.dataSources.filter(ds => 
                        logSources[ds] || logSources[ds.split(':')[0]] || logSources[ds.split('-')[0]]
                    );
                    const coverage = tech.dataSources.length ? Math.round((coveredSources.length / tech.dataSources.length) * 100) : 0;
                    const category = coverage >= 80 ? 'high' : coverage >= 50 ? 'medium' : 'low';
                    
                    matrixData[tech.id] = { 
                        coverage, category, coveredSources: coveredSources.length, totalSources: tech.dataSources.length,
                        technique: tech.name, tactic: MITRE_TACTICS[tacticId].name
                    };
                });
            });

            renderMatrix();
            updateSummaryStats();
            document.querySelectorAll('button:not(#analyzeBtn)').forEach(btn => btn.disabled = false);
        }

        function renderMatrix() {
            const table = document.getElementById('attackMatrix');
            let html = '<tr><td></td>'; // Empty corner cell

            // Technique headers (top row)
            let colIndex = 0;
            Object.values(MITRE_TACTICS).forEach(tactic => {
                tactic.techniques.slice(0, 12).forEach(tech => { // Max 12 per tactic
                    html += `<td class="technique-header" data-tech="${tech.id}">
                        <div class="id">${tech.id}</div>
                        <div class="name">${tech.name}</div>
                    </td>`;
                    colIndex++;
                });
            });
            html += '</tr>';

            // Tactic rows
            Object.entries(MITRE_TACTICS).forEach(([tacticId, tactic]) => {
                html += `<td class="tactic-header" rowspan="${tactic.techniques.slice(0,12).length + 1}">
                    ${tactic.name.replace(/&/g, '&')}
                </td>`;
                
                tactic.techniques.slice(0, 12).forEach(tech => {
                    html += `<tr>`;
                    html += `<td class="technique-header" data-tech="${tech.id}">
                        <div class="id">${tech.id}</div>
                        <div class="name">${tech.name}</div>
                    </td>`;
                    
                    // Coverage cells
                    Object.values(MITRE_TACTICS).forEach(otherTactic => {
                        otherTactic.techniques.slice(0, 12).forEach(otherTech => {
                            const data = matrixData[otherTech.id];
                            const className = data ? `coverage-${data.category}` : 'coverage-none';
                            const score = data ? data.coverage : 0;
                            html += `<td class="${className}" data-tech="${otherTech.id}" data-tactic="${tacticId}">
                                <div>${score}%</div>
                            </td>`;
                        });
                    });
                    html += `</tr>`;
                });
            });

            table.innerHTML = html;

            // Add hover tooltips
            document.querySelectorAll('td[data-tech]').forEach(cell => {
                cell.addEventListener('mouseenter', e => showTooltip(e.target.dataset.tech, e));
                cell.addEventListener('mouseleave', hideTooltip);
                cell.addEventListener('mousemove', e => updateTooltipPos(e));
            });
        }

        function updateSummaryStats() {
            const stats = document.getElementById('summaryStats');
            const coverages = Object.values(matrixData).map(d => d.coverage);
            const avgCoverage = coverages.length ? Math.round(coverages.reduce((a,b)=>a+b)/coverages.length) : 0;
            const high = coverages.filter(c => c >= 80).length;
            const med = coverages.filter(c => c >= 50 && c < 80).length;
            const low = coverages.filter(c => c < 50).length;

            stats.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number coverage-${avgCoverage>=80?'high':avgCoverage>=50?'medium':'low'}">${avgCoverage}%</div>
                    <div>Average Coverage</div>
                </div>
                <div class="stat-card"><div class="stat-number coverage-high">${high}</div><div>High Coverage</div></div>
                <div class="stat-card"><div class="stat-number coverage-medium">${med}</div><div>Medium Coverage</div></div>
                <div class="stat-card"><div class="stat-number coverage-low">${low}</div><div>Low/No Coverage</div></div>
            `;
        }

        function showTooltip(techId, event) {
            const data = matrixData[techId];
            if (!data) return;
            
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `
                <strong>${techId}: ${data.technique}</strong><br>
                Coverage: <strong>${data.coverage}%</strong><br>
                Sources: ${data.coveredSources}/${data.totalSources}<br>
                Status: <span class="coverage-${data.category}">${data.category.toUpperCase()}</span>
            `;
            tooltip.style.display = 'block';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        function updateTooltipPos(event) {
            const tooltip = document.getElementById('tooltip');
            tooltip.style.left = (event.pageX + 15) + 'px';
            tooltip.style.top = (event.pageY - 10) + 'px';
        }

        function updateStatus(msg, type = '') {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = `status ${type}`;
        }

        function exportLayer() { /* Navigator layer export - same as before */ }
        function exportCSV() { /* CSV export - same as before */ }
        function resetMatrix() { 
            logSources = {}; 
            matrixData = {}; 
            document.getElementById('logsCsv').value = '';
            document.getElementById('attackMatrix').innerHTML = '';
            updateStatus('Matrix reset');
        }

        // Initialize
        window.addEventListener('load', loadMitreData);
    </script>
</body>
</html>
